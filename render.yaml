services:
  - type: web
    name: rifa-app
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: RIFA_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RIFA_START
        sync: false
      - key: RIFA_END
        sync: false
      - key: NODE_ENV
        value: production
